version: '3.8'

# 🔥 1. 공통 설정 (OS 상관없이 뼈대가 되는 설정)
x-base-config: &base-config
  build: 
    context: .
    dockerfile: Dockerfile
    args:
      - DOCKER_MODE=${DOCKER_MODE:-server}
  image: lucia_project_env:${DOCKER_MODE:-server}
  container_name: lucia_${DOCKER_MODE:-server}
  stdin_open: true
  tty: true
  shm_size: 64g
  ulimits:
    memlock:
      soft: -1
      hard: -1
    stack:
      soft: 67108864
      hard: 67108864
  ports:
    - "3545:3545"
    - "3546:3546"
    - "8888:8888"
  working_dir: /workspace

services:
  # 🐧 2. 리눅스(Linux) 전용 환경
  melissa_linux:
    <<: *base-config
    profiles: ["linux"]
    runtime: nvidia
    ipc: host
    volumes:
      - './project_lucia_docker:/workspace'
      - './nltk_data:/workspace/nltk_data'
      - '/tmp/.X11-unix:/tmp/.X11-unix:rw'
      - '/sys/class/drm:/sys/class/drm:ro'
      - '/sys/devices:/sys/devices:ro'
      - '/sys/bus/pci:/sys/bus/pci:ro'
    environment:
      CUDA_HOME: /usr/local/cuda
      PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/lib:/usr/lib
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,graphics"
      NLTK_DATA: /workspace/nltk_data
    # 리눅스에만 있어야 하는 하드웨어 마운트
    devices:
      - "/dev/dri:/dev/dri"

  # 🪟 3. 윈도우(Windows / WSL2) 전용 환경
  melissa_windows:
    <<: *base-config
    profiles: ["windows"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # 윈도우에서는 에러를 유발하는 리눅스 경로들(/sys/* 등) 제외
      - './project_lucia_docker:/workspace'
      - './nltk_data:/workspace/nltk_data'
    environment:
      CUDA_HOME: /usr/local/cuda
      PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/lib:/usr/lib
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,graphics"
      NLTK_DATA: /workspace/nltk_data
    # ❌ 이곳에는 절대 devices: - "/dev/dri:/dev/dri" 가 들어가면 안 됩니다!
