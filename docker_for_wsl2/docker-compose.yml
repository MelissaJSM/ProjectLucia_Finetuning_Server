version: '3.8'

services:
  grpo:
    build: 
      context: .
      dockerfile: Dockerfile
    image: lucia_project_env:latest
    container_name: exllama
    # runtime: nvidia 대신 아래 deploy 설정을 사용하는 것이 최신 표준입니다.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    stdin_open: true
    tty: true
    shm_size: 64g
    ipc: host

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    ports:
      - "3545:3545"
      - "3546:3546"
      - "8888:8888"
    
    volumes:
      - '여기에_로컬_경로를_입력해주세요:/workspace'
      # 윈도우 환경에서는 아래 리눅스 전용 경로들이 에러를 유발할 수 있습니다.
      # 꼭 필요한게 아니라면 일단 주석 처리하세요.
      # - '/tmp/.X11-unix:/tmp/.X11-unix:rw'
      # - '/sys/class/drm:/sys/class/drm:ro'
      # - '/sys/devices:/sys/devices:ro'
      # - '/sys/bus/pci:/sys/bus/pci:ro'
      - './nltk_data:/workspace/nltk_data'

    environment:
      CUDA_HOME: /usr/local/cuda
      PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/lib:/usr/lib
      DISPLAY: host.docker.internal:0.0 # 윈도우 VcXsrv 등을 쓰실 경우 수정 필요
      QT_X11_NO_MITSHM: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,graphics"
      NLTK_DATA: /workspace/nltk_data
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306

    # 아래 부분이 에러의 핵심 원인입니다. 삭제하거나 주석 처리하세요.
    # devices:
    #   - "/dev/dri:/dev/dri"

    working_dir: /workspace
