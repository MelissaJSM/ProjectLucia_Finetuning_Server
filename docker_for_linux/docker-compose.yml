version: '3.8'

services:
  grpo:
    # 이미지를 직접 빌드합니다. (Dockerfile이 같은 경로에 있어야 함)
    build: 
      context: .
      dockerfile: Dockerfile
    image: lucia_project_env:latest
    container_name: exllama
    runtime: nvidia
    
    stdin_open: true
    tty: true
    shm_size: 64g
    ipc: host

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    ports:
      - "3545:3545"
      - "3546:3546"
      - "8888:8888" # (선택) Jupyter Notebook용 포트 추가
    
    volumes:
      - '/home/lucia/ProjectLucia/docker/exllama:/workspace'
      - '/tmp/.X11-unix:/tmp/.X11-unix:rw'
      - '/sys/class/drm:/sys/class/drm:ro'
      - '/sys/devices:/sys/devices:ro'
      - '/sys/bus/pci:/sys/bus/pci:ro'
      - './nltk_data:/workspace/nltk_data'

    environment:
      # CUDA 경로는 Base 이미지에서 이미 설정되어 있지만 명시 유지
      CUDA_HOME: /usr/local/cuda
      # PATH에 가상환경(/opt/venv/bin)을 최우선으로 추가
      PATH: /usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/lib:/usr/lib
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,graphics"
      
      NLTK_DATA: /workspace/nltk_data

      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306  # 포트는 윈도우 DB 포트 그대로

    devices:
      - "/dev/dri:/dev/dri"

    working_dir: /workspace
